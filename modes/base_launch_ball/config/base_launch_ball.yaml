#config_version=6
mode:
  start_events: start_mode_base_launch_ball, waiting_for_launch_press
  stop_events: stop_mode_base_launch_ball, ball_started
  priority: 200
  
slide_player:
  mode_base_launch_ball_started: 
    launch:
      action: queue_first
      priority: 200

event_player:
  e_launch_press:
    - stop_mode_base_launch_ball
  

  
show_player:
  mode_base_launch_ball_started.1: launch_tilt
  mode_base_launch_ball_started.2: launch_lights
    
