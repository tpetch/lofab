#config_version=6
mode:
  start_events: mult_fleshy_qualify_start, fleshy_modes_start{current_player.v_fleshy_qualify_started==1}, ball_started{current_player.v_fleshy_qualify_started==1}
  stop_events: fleshy_qualify_stop, stop_modes_during_multiball, mult_fleshy_lit_start
  priority: 200

shots:

  r_o_fleshy:
    switch: s_stationary_o
    profile: fleshy_profile
    reset_events: reset_fleshy
    persist_enable: true
    show_tokens:
      light1: l_target_l_hurryup_3
      light2: l_target_l_hurryup_2
      light3: l_target_l_hurryup_1
  r_s_fleshy:
    switch: s_stationary_s
    profile: fleshy_profile
    reset_events: reset_fleshy
    persist_enable: true
    show_tokens:
      light1: l_target_r_hurryup_3
      light2: l_target_r_hurryup_2
      light3: l_target_r_hurryup_1
      
shot_profiles:
  fleshy_profile:
    states:
      - name: unlit
        show: "fleshy_0"
        sync_ms: 250
      - name: light1lit
        show: "fleshy_1"
        sync_ms: 250
      - name: light2lit
        show: "fleshy_2"
        sync_ms: 250
      - name: light3lit
        show: "fleshy_3"
        sync_ms: 250
        
shot_groups:
  fleshy_shots:
    shots: r_o_fleshy, r_s_fleshy
    
event_player:
  fleshy_shots_light3lit_complete:
    - mult_fleshy_lit_start